<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AIPARK Revenue Simulator 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap');
:root{--bg0:#F7F8FA;--bg1:#fff;--bg2:#F0F2F6;--bg3:#E4E7EE;--bx:rgba(0,0,0,.08);--ct:#0D0F1A;--cs:#6B7280;--acc:#1A56DB;--ca:#00935F;--rng:#00935F;--sl-bg:#E4E7EE;--c0:#00935F;--c1:#1A56DB;--c2:#7C3AED;--c3:#D97706;--c4:#DB2777;--c5:#0891B2;--c6:#059669;--ao:#E05A1E;}
.dark{--bg0:#0D0D0D;--bg1:#1A1A1A;--bg2:#242424;--bg3:#2E2E2E;--bx:rgba(255,255,255,.1);--ct:rgba(255,255,255,.9);--cs:rgba(255,255,255,.45);--acc:#00C897;--ca:#00C897;--rng:#00C897;--sl-bg:#3A3A3A;--c0:#00C897;--c1:#3B82F6;--c2:#8B5CF6;--c3:#F59E0B;--c4:#F472B6;--c5:#22D3EE;--c6:#34D399;--ao:#FB923C;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#e8eaed;padding:1rem;font-family:'Pretendard',system-ui,sans-serif;}
#ap{background:var(--bg0);color:var(--ct);border-radius:16px;overflow:hidden;transition:background .25s,color .25s;max-width:980px;margin:0 auto;}
/* HEADER */
.hdr{background:var(--bg1);border-bottom:1px solid var(--bx);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo-wrap{display:flex;align-items:center;gap:12px;}
#logo-img{height:26px;width:auto;}
.logo-div{width:1px;height:22px;background:var(--bx);}
.logo-title{font-size:15px;font-weight:600;color:var(--ct);}
.logo-sub{font-size:12px;color:var(--cs);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.sync-btn{display:flex;align-items:center;gap:5px;font-size:14px;padding:5px 12px;border-radius:8px;border:1px solid var(--bx);background:var(--bg2);color:var(--cs);cursor:pointer;font-family:inherit;transition:all .2s;}
.sync-btn:hover{border-color:var(--acc);color:var(--acc);}
.sync-btn.loading{opacity:.6;pointer-events:none;}
.theme-btn{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--bx);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:14px;color:var(--cs);font-family:inherit;}
.theme-btn:hover{border-color:var(--acc);}
.tog{width:28px;height:16px;border-radius:8px;background:var(--bg3);position:relative;flex-shrink:0;transition:background .2s;}
.tog.on{background:var(--acc);}
.tog-k{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on .tog-k{transform:translateX(12px);}
/* BODY */
.body{padding:18px 24px;}
/* SYNC STATUS */
.sync-status{font-size:13px;padding:7px 14px;border-radius:7px;margin-bottom:14px;display:none;}
.sync-status.ok{display:block;background:rgba(0,150,100,.08);color:var(--ca);border:1px solid rgba(0,150,100,.2);}
.sync-status.err{display:block;background:rgba(220,38,38,.08);color:#DC2626;border:1px solid rgba(220,38,38,.2);}
/* TOP KPIs */
.krow5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:16px;}
.kc{background:var(--bg1);border:1px solid var(--bx);border-radius:10px;padding:12px 13px;transition:background .25s,border-color .25s;}
.kc-l{font-size:11px;color:var(--cs);margin-bottom:4px;display:flex;align-items:center;gap:3px;white-space:nowrap;overflow:hidden;}
.kc-v{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:12px;font-weight:600;margin-top:3px;}
/* ACTUAL DATA BANNER */
.data-banner{background:var(--bg1);border:1px solid var(--bx);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.db-section{font-size:13px;}
.db-title{font-weight:600;color:var(--ct);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.db-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:0.5px solid var(--bx);}
.db-row:last-child{border-bottom:none;}
.db-name{color:var(--cs);}
.db-vals{display:flex;gap:8px;align-items:center;}
.db-actual{font-weight:600;}
.db-target{color:var(--cs);font-size:12px;}
.ach-pill{padding:1px 6px;border-radius:10px;font-size:12px;font-weight:600;}
/* NAV */
.nav{display:flex;gap:2px;margin-bottom:14px;background:var(--bg2);border-radius:9px;padding:3px;flex-wrap:wrap;}
.nb{font-size:14px;font-weight:500;padding:6px 12px;border-radius:7px;border:none;background:none;cursor:pointer;color:var(--cs);transition:all .15s;font-family:inherit;white-space:nowrap;}
.nb.on{background:var(--bg1);color:var(--ct);box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sec{display:none;}.sec.on{display:block;}
/* STREAM TABS */
.stabs{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap;}
.stab{font-size:13px;padding:5px 11px;border-radius:7px;border:1px solid var(--bx);cursor:pointer;background:var(--bg1);color:var(--cs);transition:all .15s;font-family:inherit;}
/* CARD */
.card{background:var(--bg1);border:1px solid var(--bx);border-radius:10px;padding:15px 17px;margin-bottom:11px;transition:background .25s,border-color .25s;}
.ct{font-size:12px;font-weight:600;color:var(--cs);text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px;}
/* STREAM KPIs */
.skpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-bottom:11px;}
.sk{background:var(--bg2);border-radius:7px;padding:9px 11px;}
.sk-l{font-size:12px;color:var(--cs);margin-bottom:2px;display:flex;align-items:center;gap:3px;}
.sk-v{font-size:15px;font-weight:600;}
/* SLIDERS */
.slg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 22px;}
.sr{margin-bottom:11px;}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sl{font-size:13px;color:var(--cs);display:flex;align-items:center;gap:3px;}
.ni{width:68px;font-size:13px;font-weight:600;text-align:right;border:1px solid var(--bx);border-radius:6px;padding:3px 6px;background:var(--bg2);color:var(--ct);font-family:inherit;}
.ni:focus{outline:none;border-color:var(--acc);}
.su{font-size:12px;color:var(--cs);}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:var(--sl-bg);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--rng);border:2px solid var(--bg1);}
.smm{display:flex;justify-content:space-between;margin-top:2px;}
.smm span{font-size:12px;color:var(--cs);opacity:.4;}
/* CHART */
.c2col{display:grid;grid-template-columns:2fr 1fr;gap:11px;margin-bottom:11px;}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px;}
.ld{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--cs);}
.ld-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--bg2);padding:7px 8px;text-align:right;font-weight:600;font-size:12px;color:var(--cs);text-transform:uppercase;letter-spacing:.4px;}
th:first-child{text-align:left;}
td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--bx);}
td:first-child{text-align:left;font-weight:500;}
tr.tr-total td{background:var(--bg2);font-weight:600;}
tr.tr-actual td{background:rgba(0,150,100,.04);}
/* KPI CARDS */
.kpi-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;}
.kpi-card{background:var(--bg1);border:1px solid var(--bx);border-radius:10px;padding:13px 15px;}
.kc-title{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bx);}
.kc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.kc-lb{font-size:13px;color:var(--cs);display:flex;align-items:center;gap:3px;}
.kc-vl{font-size:14px;font-weight:600;}
/* INSIGHT */
.insight{background:var(--bg2);border-left:3px solid var(--ca);border-radius:0 7px 7px 0;padding:11px 14px;font-size:13px;line-height:1.8;color:var(--cs);margin-top:11px;}
.insight b{color:var(--ct);}
/* PROGRESS */
.prog-wrap{background:var(--bg1);border:1px solid var(--bx);border-radius:10px;padding:14px 17px;margin-top:4px;}
.prog-hd{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
.prog-track{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .4s;}
.prog-note{font-size:12px;color:var(--cs);margin-top:6px;}
/* COMPARISON */
.comp-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.ach-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:13px;}
.ach-label{width:100px;flex-shrink:0;color:var(--cs);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ach-bar-wrap{flex:1;min-width:60px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.ach-bar{height:100%;border-radius:3px;transition:width .3s;}
/* PIPELINE */
.pipe-grid{display:grid;gap:7px;}
.pipe-row{background:var(--bg1);border:1px solid var(--bx);border-radius:8px;padding:10px 13px;display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center;}
.pipe-stream{font-size:12px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;}
.pipe-client{font-size:14px;font-weight:500;}
.pipe-amount{font-size:15px;font-weight:600;}
.pipe-service{font-size:12px;color:var(--cs);}
/* TOOLTIP */
.tip-popup{display:none;position:fixed;z-index:9999;width:245px;border-radius:11px;padding:13px;box-shadow:0 8px 28px rgba(0,0,0,.14);}
.tip-popup.show{display:block;}
.tip-popup.lm{background:#fff;border:1px solid rgba(0,0,0,.1);color:#0D0F1A;}
.tip-popup.dm{background:#1E1E1E;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.9);}
.tip-close{float:right;cursor:pointer;font-size:14px;opacity:.4;margin-left:8px;background:none;border:none;font-family:inherit;color:inherit;}
.tip-head{font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4;}
.tip-def{font-size:13px;line-height:1.7;margin-bottom:8px;opacity:.6;}
.tip-ins{font-size:13px;line-height:1.7;background:rgba(128,128,128,.1);border-radius:6px;padding:8px 10px;}
.tip-ins b{color:#00935F;}.dark .tip-ins b{color:#00C897;}
.ti{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;border:1px solid var(--bx);font-size:11px;color:var(--cs);cursor:pointer;flex-shrink:0;vertical-align:middle;background:none;font-family:inherit;transition:all .15s;}
.ti:hover{border-color:var(--acc);color:var(--acc);}
/* SCEN */
.scen-row{display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.btn{font-size:13px;padding:5px 11px;border-radius:7px;border:1px solid var(--bx);cursor:pointer;background:var(--bg1);color:var(--cs);transition:all .15s;font-family:inherit;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.scen-tag{font-size:13px;color:var(--ca);}
@media(max-width:640px){.krow5,.c2col,.comp-kpis{grid-template-columns:repeat(2,1fr);}.slg,.data-banner{grid-template-columns:1fr;}.pipe-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="ap">

<div class="tip-popup lm" id="ap-tip">
  <button class="tip-close" onclick="hideTip()">✕</button>
  <div class="tip-head" id="tt-h"></div>
  <div class="tip-def" id="tt-d"></div>
  <div class="tip-ins" id="tt-i"></div>
</div>

<div class="hdr">
  <div class="logo-wrap">
    <img id="logo-img" src="" alt="AIPARK" style="height:26px;width:auto;">
    <div class="logo-div"></div>
    <div><div class="logo-title">Revenue Simulator 2026</div><div class="logo-sub">실적 연동 · 내부 전략 검토용</div></div>
  </div>
  <div class="hdr-right">
    <button class="sync-btn" id="sync-btn" onclick="syncFromSheets()" title="GS 웹앱 URL 미설정 — 하단 안내 참고">
      <span id="sync-icon">🔄</span> GS 실적 동기화
    </button>
    <button class="theme-btn" onclick="toggleTheme()">
      <span id="theme-lbl">🌙 다크</span>
      <div class="tog" id="tog"><div class="tog-k"></div></div>
    </button>
  </div>
</div>

<div class="body">
<div id="sync-status" class="sync-status"></div>
<div class="krow5" id="top-kpis"></div>

<!-- 실적/목표 배너 -->
<div class="data-banner" id="data-banner"></div>

<!-- SCENARIO -->
<div class="scen-row">
  <span style="font-size:11px;color:var(--cs);">시나리오</span>
  <button class="btn" onclick="saveScen('cons')">📉 보수적</button>
  <button class="btn" onclick="saveScen('base')">📊 기준</button>
  <button class="btn" onclick="saveScen('aggr')">📈 적극적</button>
  <button class="btn" onclick="showCompare()" style="border-color:var(--ca);color:var(--ca);">비교 보기</button>
  <span class="scen-tag" id="scen-status"></span>
</div>
<div id="compare-wrap" style="display:none;margin-bottom:12px;">
  <div class="card"><div class="ct">시나리오 비교</div><div style="overflow-x:auto;" id="compare-tbl"></div></div>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- SEC 0: 변수 설정 -->
<div class="sec on" id="sec0">
  <div class="stabs" id="stabs"></div>
  <div class="card"><div class="skpis" id="skpis"></div><div class="slg" id="sl-main"></div></div>
  <div class="card">
    <div class="ct">💰 비용 설정 <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;">(BEP 계산용)</span></div>
    <div class="slg" id="sl-cost"></div>
  </div>
</div>

<!-- SEC 1: 차트 -->
<div class="sec" id="sec1">
  <div class="c2col">
    <div class="card" style="margin-bottom:0;">
      <div class="ct">월별 MRR 추이 + 누적 매출</div>
      <div style="position:relative;height:200px;"><canvas id="bar-c"></canvas></div>
      <div class="legend">
        <div class="ld"><div class="ld-dot" style="background:var(--c0);"></div>통합 SaaS</div>
        <div class="ld"><div class="ld-dot" style="background:var(--c1);"></div>V-GEN API</div>
        <div class="ld"><div class="ld-dot" style="background:var(--c2);"></div>Enterprise</div>
        <div class="ld"><div class="ld-dot" style="background:var(--c3);"></div>영상제작</div>
        <div class="ld"><div class="ld-dot" style="border-radius:50%;background:var(--ao);"></div>누적</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:0;">
      <div class="ct">스트림 비중</div>
      <div style="position:relative;height:160px;"><canvas id="pie-c"></canvas></div>
      <div style="font-size:10px;color:var(--cs);text-align:center;margin-top:5px;">현재 MRR 기준</div>
    </div>
  </div>
  <div style="background:var(--bg2);border-radius:7px;padding:10px 13px;font-size:11px;color:var(--cs);line-height:1.7;" id="bep-note"></div>
</div>

<!-- SEC 2: 월별 테이블 -->
<div class="sec" id="sec2">
  <div class="card" style="overflow-x:auto;">
    <table>
      <thead><tr><th>월</th><th>통합SaaS</th><th>V-GEN API</th><th>Enterprise</th><th>영상제작</th><th>시뮬 MRR</th><th>실적 MRR</th><th>달성률</th><th>누적</th></tr></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>

<!-- SEC 3: SaaS 지표 -->
<div class="sec" id="sec3">
  <div class="card">
    <div class="ct">CAC 입력 <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;">(고객 획득 비용)</span></div>
    <div class="slg" id="sl-cac"></div>
  </div>
  <div class="kpi-cards" id="kpi-cards"></div>
  <div class="insight" id="kpi-insight"></div>
</div>

<!-- SEC 4: 실적 vs 시뮬 비교 -->
<div class="sec" id="sec4">
  <div class="comp-kpis" id="comp-kpis"></div>
  <div class="card" style="margin-bottom:11px;">
    <div class="ct">MRR 실적 vs 시뮬레이션</div>
    <div style="position:relative;height:210px;"><canvas id="comp-chart"></canvas></div>
    <div class="legend" style="margin-top:9px;">
      <div class="ld"><div class="ld-dot" style="background:var(--c1);border-radius:50%;"></div>시뮬레이션</div>
      <div class="ld"><div class="ld-dot" style="background:var(--ao);border-radius:50%;"></div>실제 MRR</div>
      <div class="ld"><div class="ld-dot" style="background:var(--c0);border-radius:50%;"></div>누적 시뮬</div>
      <div class="ld"><div class="ld-dot" style="background:var(--ao);border-radius:50%;opacity:.5;"></div>누적 실적</div>
    </div>
  </div>
  <div class="card">
    <div class="ct">스트림별 연간 목표 달성 현황</div>
    <div id="stream-ach"></div>
  </div>
  <div class="insight" id="comp-insight"></div>
</div>

<!-- SEC 5: 파이프라인 -->
<div class="sec" id="sec5">
  <div class="card">
    <div class="ct" style="margin-bottom:8px;">파이프라인 요약</div>
    <div class="krow5" id="pipe-summary" style="margin-bottom:12px;"></div>
    <div class="ct">딜 현황</div>
    <div class="pipe-grid" id="pipe-list"></div>
  </div>
  <div class="insight" id="pipe-insight"></div>
</div>

<!-- PROGRESS -->
<div class="prog-wrap">
  <div class="prog-hd">
    <span style="color:var(--cs);">2026 연간 목표 달성률 <button class="ti" onclick="event.stopPropagation();showTip('target',this)">?</button></span>
    <span style="font-weight:600;" id="prog-pct"></span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-bar"></div></div>
  <div class="prog-note" id="prog-note"></div>
</div>

</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

let isDark=false;
function toggleTheme(){
  isDark=!isDark;
  document.getElementById('ap').classList.toggle('dark',isDark);
  document.getElementById('tog').classList.toggle('on',isDark);
  document.getElementById('theme-lbl').textContent=isDark?'☀️ 라이트':'🌙 다크';
  document.getElementById('logo-img').src=isDark?LOGO_DARK:LOGO_LIGHT;
  document.getElementById('ap-tip').className='tip-popup '+(isDark?'dm':'lm');
  if(bC||pC||ccC)redrawAllCharts();
}

function showTip(k,el){
  const t=TIPS[k];if(!t)return;
  document.getElementById('tt-h').textContent=t.h;
  document.getElementById('tt-d').textContent=t.d;
  document.getElementById('tt-i').innerHTML=t.i;
  const b=document.getElementById('ap-tip');
  b.className='tip-popup show '+(isDark?'dm':'lm');
  const r=el.getBoundingClientRect();
  let top=r.bottom+8,left=r.left-10;
  if(left+255>window.innerWidth)left=window.innerWidth-260;
  if(top+220>window.innerHeight)top=r.top-230;
  b.style.top=top+'px';b.style.left=left+'px';
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmt(w,d=1){if(w===null||isNaN(w)||!isFinite(w))return'—';if(w>=10000)return(w/10000).toFixed(d)+'억원';return Math.round(w).toLocaleString()+'만원';}
function fmtPct(v){if(v===null)return'—';return(v>0?'+':'')+v.toFixed(1)+'%';}
function achColor(pct){return pct>=100?'#00935F':pct>=70?'#D97706':'#DC2626';}
function achBg(pct){return pct>=100?'rgba(0,150,100,.1)':pct>=70?'rgba(217,119,6,.1)':'rgba(220,38,38,.1)';}
function getActualMRR(m){const d=REAL.monthly_mrr.find(r=>r.month===m+1);return d?d.total_mrr:null;}

// ── SIM CORE ──────────────────────────────────────────────────────────────
function sMRR(s){return[s.avCust*s.avARPU,s.vgClients*s.vgARPU,s.entContracts*s.entAvg/12,s.vidVol*s.vidPrice];}
function sim(s){
  const av=[],vg=[],ent=[],vid=[];let ac=s.avCust,vc=s.vgClients,ec=s.entContracts,vv=s.vidVol;
  for(let m=1;m<=12;m++){
    ac=ac*(1-s.avChurn/100)+s.avLeads*(s.avConv/100);av.push(+(ac*s.avARPU).toFixed(0));
    vc=vc*(1-s.vgChurn/100)+s.vgNew;vg.push(+(vc*s.vgARPU).toFixed(0));
    if(m%3===0)ec+=s.entNewQ;ent.push(+(ec*s.entAvg/12).toFixed(0));
    vv+=s.vidGrowth;vid.push(+(vv*s.vidPrice).toFixed(0));
  }
  return{av,vg,ent,vid};
}
function getBEP(r){let c=0;const m=r.av.map((v,i)=>v+r.vg[i]+r.ent[i]+r.vid[i]);for(let i=0;i<12;i++){c+=m[i];if(c>=TARGET)return i+1;}return null;}

    <div class="kc"><div class="kc-l">누적 실적</div><div class="kc-v" style="color:var(--ao);">${cnt?fmt(cumAct):'—'}</div></div>
    <div class="kc"><div class="kc-l">실적 목표 달성률</div><div class="kc-v" style="color:${actTgt!==null?achColor(actTgt):'var(--cs)'};">${actTgt!==null?actTgt+'%':'—'}</div></div>`;

  const simLine=mo.slice(),actLine=actMRRs.map(v=>v);
  let cs2=0,ca2=0;
  const cumSimArr=[],cumActArr=[];
  simLine.forEach((v,i)=>{cs2+=v;cumSimArr.push(cs2);ca2+=(actLine[i]||0);cumActArr.push(actLine[i]!==null?ca2:null);});
  const tC=isDark?'rgba(255,255,255,.35)':'rgba(0,0,0,.45)',gC=isDark?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)';
  if(ccC)ccC.destroy();
  ccC=new Chart(document.getElementById('comp-chart').getContext('2d'),{
    data:{labels:MONTHS,datasets:[
      {type:'line',label:'시뮬레이션',data:simLine,borderColor:C[1],borderWidth:2,borderDash:[5,3],pointRadius:3,fill:false,tension:.3},
      {type:'line',label:'실제 MRR',data:actLine,borderColor:isDark?'#FB923C':'#E05A1E',borderWidth:2.5,pointRadius:5,fill:false,tension:.3,spanGaps:false},
      {type:'line',label:'누적 시뮬',data:cumSimArr,borderColor:C[0],borderWidth:1.5,borderDash:[3,3],pointRadius:0,fill:false,yAxisID:'y2',tension:.3},
      {type:'line',label:'누적 실적',data:cumActArr,borderColor:isDark?'#FB923C':'#E05A1E',borderWidth:1.5,pointRadius:0,fill:false,yAxisID:'y2',tension:.3,spanGaps:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.raw)}`}}},
    scales:{x:{grid:{color:gC},ticks:{color:tC,font:{size:10}}},y:{grid:{color:gC},ticks:{color:tC,font:{size:10},callback:v=>fmt(v)}},y2:{position:'right',grid:{display:false},ticks:{color:'rgba(128,128,128,.4)',font:{size:10},callback:v=>fmt(v)}}}}
  });

  // 스트림별 연간 목표 달성
  const streamDefs=[
    {label:'공공혁신제품', d:REAL.streams.public, color:'#9333EA'},
    {label:'Enterprise', d:REAL.streams.ent, color:C[2]},
    {label:'통합 SaaS', d:REAL.streams.saas, color:C[0]},
    {label:'영상제작대행', d:REAL.streams.vid, color:C[3]},
    {label:'커스텀아바타', d:REAL.streams.custom, color:'#0891B2'},
    {label:'디지털명함', d:REAL.streams.bizcard, color:'#DB2777'},
    {label:'V-GEN API', d:REAL.streams.vgen, color:C[1]},
  ];
  document.getElementById('stream-ach').innerHTML=streamDefs.map(({label,d,color})=>{
    const pct=d.annual_target?Math.round(d.annual_actual/d.annual_target*100):0;
    const barW=Math.min(pct,100);
    return `<div class="ach-row">
      <div class="ach-label" style="color:${color};">● ${label}</div>
      <div class="ach-bar-wrap"><div class="ach-bar" style="width:${barW}%;background:${achColor(pct)};"></div></div>
      <span style="font-size:11px;font-weight:600;width:36px;text-align:right;color:${achColor(pct)};">${pct}%</span>

  // 인사이트
  const vgenPct=REAL.streams.vgen.q1_target?Math.round(REAL.streams.vgen.q1_actual/REAL.streams.vgen.q1_target*100):0;

  document.getElementById('comp-insight').innerHTML=`<b>📈 Q1 실적 기반 전략 인사이트</b><br>
    • <b>V-GEN API</b> Q1 달성률 ${vgenPct}% — 목표 초과 달성. 연간 목표 재상향 검토 권장.<br>
    • <b>Enterprise</b> Q1 달성률 ${entPct}% — 파이프라인 딜(총 약 5,200만원) 클로징 속도가 연간 목표 달성의 핵심.<br>
    • <b>커스텀아바타</b> Q1 82% 달성 — Q2 집중 세일즈로 조기 달성 가능.<br>
    • <b>공공혁신제품·통합SaaS·디지털명함</b> 실적 0 — Q2 집중 실행 필요. 파이프라인 공공혁신제품 딜 3건(총 3억) 클로징이 핵심.<br>
    • <b>시뮬레이터 팁:</b> 변수 설정 탭에서 전환율·이탈률을 실제값으로 조정해 현실적인 12개월 예측을 만들어보세요.`;

// ── SaaS KPIs ─────────────────────────────────────────────────────────────
function updateKPIs(){
  const C=getC(),acr=S.avChurn/100||.001,vcr=S.vgChurn/100||.001;
  const la=S.avARPU/acr,lv=S.vgARPU/vcr;
  const lca=S.cacAv>0?la/S.cacAv:0,lcv=S.cacVg>0?lv/S.cacVg:0;
  const pb=(cac,arpu)=>arpu>0?(cac/arpu).toFixed(1)+'개월':'—';
  const lcc=v=>v>=5?'#00935F':v>=2?'#D97706':'#DC2626';
  function kc(col,name,rows){return `<div class="kpi-card"><div class="kc-title" style="color:${col};">${name}</div>${rows.map(r=>`<div class="kc-row"><div class="kc-lb">${r[0]}</div><div class="kc-vl" ${r[2]?`style="color:${r[2]};"`:''}>${r[1]}</div></div>`).join('')}</div>`;}
  document.getElementById('kpi-cards').innerHTML=
    kc(C[0],'통합 SaaS',[[ti('cac','CAC'),fmt(S.cacAv)],[ti('ltv','LTV'),fmt(la)],[ti('ltvcac','LTV:CAC'),lca.toFixed(1)+'x',lcc(lca)],[ti('payback','Payback'),pb(S.cacAv,S.avARPU)]])+
    kc(C[1],'V-GEN API',[[ti('cac','CAC'),fmt(S.cacVg)],[ti('ltv','LTV'),fmt(lv)],[ti('ltvcac','LTV:CAC'),lcv.toFixed(1)+'x',lcc(lcv)],[ti('payback','Payback'),pb(S.cacVg,S.vgARPU)]])+
    kc(C[2],'Enterprise',[[ti('cac','CAC'),fmt(S.cacEnt)],['월 인식 매출',fmt(S.entAvg/12)],[ti('payback','Payback'),pb(S.cacEnt,S.entAvg/12)]])+
    kc(C[3],'영상제작',[[ti('cac','CAC'),fmt(S.cacVid)],['편당 단가',fmt(S.vidPrice)],[ti('payback','Payback'),pb(S.cacVid,S.vidPrice)]]);
  const best=lca>lcv?`통합 SaaS (${lca.toFixed(1)}x)`:`V-GEN API (${lcv.toFixed(1)}x)`;
  document.getElementById('kpi-insight').innerHTML=`<b>📊 현재 설정 기반 인사이트</b><br>
    • <b>가장 효율적인 채널:</b> ${best}<br>
    • <b>V-GEN API</b>는 현재 실적 기준 CAC 대비 수익성이 가장 높습니다. 신규 파트너 확대가 핵심 레버입니다.<br>
    • <b>핵심 레버:</b> 이탈률 1%p ↓ = LTV 대폭 상승.`;
}

// ── PIPELINE ──────────────────────────────────────────────────────────────
function updatePipeline(){
  const C=getC();
  const streamColors={'공공혁신제품':'#9333EA','Enterprise':C[2],'영상제작대행':C[3],'디지털명함':'#DB2777'};
  const totalPipe=REAL.pipeline.reduce((s,p)=>s+(p.amount||0),0);
  const byStream={};
  REAL.pipeline.forEach(p=>{byStream[p.stream]=(byStream[p.stream]||0)+(p.amount||0);});
  document.getElementById('pipe-summary').innerHTML=`
    <div class="kc"><div class="kc-l">총 딜 건수</div><div class="kc-v">${REAL.pipeline.length}건</div></div>
    <div class="kc"><div class="kc-l">총 파이프라인 금액</div><div class="kc-v" style="color:var(--ao);">${fmt(totalPipe)}</div></div>
    <div class="kc"><div class="kc-l">공공혁신제품</div><div class="kc-v" style="color:#9333EA;">${fmt(byStream['공공혁신제품']||0)}</div></div>
    <div class="kc"><div class="kc-l">Enterprise</div><div class="kc-v" style="color:${C[2]};">${fmt(byStream['Enterprise']||0)}</div></div>
    <div class="kc" style="grid-column:span 1;"><div class="kc-l">기타</div><div class="kc-v">${fmt((byStream['영상제작대행']||0)+(byStream['디지털명함']||0))}</div></div>`;

  document.getElementById('pipe-list').innerHTML=REAL.pipeline.map(p=>{
    const col=streamColors[p.stream]||'var(--cs)';
    return `<div class="pipe-row">
      <span class="pipe-stream" style="background:${col}18;color:${col};">${p.stream}</span>
      <div><div class="pipe-client">${p.client}</div><div class="pipe-service">${p.service||''}</div></div>
      <div class="pipe-amount" style="color:${p.amount?'var(--ct)':'var(--cs)'};">${p.amount?fmt(p.amount):'협의중'}</div>
    </div>`;
  }).join('');
  document.getElementById('pipe-insight').innerHTML=`<b>🔍 파이프라인 인사이트</b><br>
    • <b>공공혁신제품</b> 3건 합계 약 3억원 — 이 딜들 중 2건만 클로징해도 연간 목표의 20%가 채워집니다.<br>
    • <b>Enterprise</b> 딜 건당 평균 860만원 — 월 3건 클로징 목표 달성 시 연간 Enterprise 목표 초과 가능.<br>
    • <b>KB손해보험 디지털명함</b> 딜은 성사 시 연간 목표(9억) 대비 큰 기여 예상. 클로징 우선순위 높음.`;
}

// ── SLIDERS ───────────────────────────────────────────────────────────────
function mkSlider(d){
  const v=S[d.k],lbl=d.ti?ti(d.ti,d.l):d.l;
  return `<div class="sr"><div class="sh"><label class="sl">${lbl}</label>
    <div style="display:flex;align-items:center;gap:4px;"><input type="number" class="ni" id="num-${d.k}" value="${v}" min="${d.min}" max="${d.max}" step="${d.step}" oninput="syncN('${d.k}',${d.min},${d.max})"><span class="su">${d.u}</span></div></div>
    <input type="range" id="rng-${d.k}" min="${d.min}" max="${d.max}" step="${d.step}" value="${v}" oninput="syncR('${d.k}')">
    <div class="smm"><span>${d.min.toLocaleString()}</span><span>${d.max.toLocaleString()}</span></div>
  </div>`;
}
function syncR(k){const v=+document.getElementById('rng-'+k).value;document.getElementById('num-'+k).value=v;S[k]=v;update();}
function syncN(k,mn,mx){let v=+document.getElementById('num-'+k).value;v=Math.max(mn,Math.min(mx,v));document.getElementById('rng-'+k).value=v;S[k]=v;update();}

const NAVS=['변수 설정','차트','월별 테이블','SaaS 지표','📊 실적 비교','🔭 파이프라인'];

}
function setTab(i,el){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.querySelectorAll('.sec').forEach((s,j)=>s.classList.toggle('on',j===i));

// ── SCENARIO ──────────────────────────────────────────────────────────────
function saveScen(t){scenarios[t]=JSON.parse(JSON.stringify(S));const l={cons:'보수적',base:'기준',aggr:'적극적'};const el=document.getElementById('scen-status');el.textContent='✓ '+l[t]+' 저장됨';setTimeout(()=>el.textContent='',2000);}
function showCompare(){
  const p=document.getElementById('compare-wrap');
  if(p.style.display!=='none'){p.style.display='none';return;}
  const saved=Object.entries(scenarios).filter(([,v])=>v);
  if(!saved.length){alert('저장된 시나리오가 없습니다.');return;}
  const L={cons:'📉 보수적',base:'📊 기준',aggr:'📈 적극적'};
  const M=[
    {l:'현재 MRR',f:s=>fmt(sMRR(s).reduce((a,b)=>a+b,0))},
    {l:'12개월 후 MRR',f:s=>{const r=sim(s);return fmt(r.av[11]+r.vg[11]+r.ent[11]+r.vid[11]);}},
    {l:'12개월 누적',f:s=>{const r=sim(s);let c=0;for(let i=0;i<12;i++)c+=r.av[i]+r.vg[i]+r.ent[i]+r.vid[i];return fmt(c);}},
    {l:'목표달성 예상월',f:s=>{const r=sim(s);const m=getBEP(r);return m?m+'개월':'미달성';}}
  ];
  let html=`<table><thead><tr><th style="text-align:left;">지표</th>${saved.map(([k])=>`<th>${L[k]}</th>`).join('')}</tr></thead><tbody>`;
  M.forEach(m=>{html+=`<tr><td>${m.l}</td>${saved.map(([,v])=>`<td>${m.f(v)}</td>`).join('')}</tr>`;});
  html+='</tbody></table>';
  document.getElementById('compare-tbl').innerHTML=html;
  p.style.display='block';
}

// ── GOOGLE SHEETS SYNC ────────────────────────────────────────────────────
async function syncFromSheets(){
  let url = REAL.gs_webapp_url;
  if(!url){
    // URL 입력 팝업
    const entered = prompt(
      'GS 웹앱 URL을 입력하세요.\n\n' +
      '설정 방법:\n' +
      '1. 매출목표 구글시트 → 확장 프로그램 → Apps Script\n' +
      '2. SimulatorAPI.gs 파일 붙여넣기 후 저장\n' +
      '3. 배포 → 새 배포 → 웹 앱 → 액세스: 모든 사용자\n' +
      '4. 배포 URL 복사 후 여기에 붙여넣기',
      ''
    );
    if(!entered || !entered.trim()){return;}
    REAL.gs_webapp_url = entered.trim();
    url = REAL.gs_webapp_url;
  }
  const btn=document.getElementById('sync-btn');
  const icon=document.getElementById('sync-icon');
  btn.classList.add('loading');icon.textContent='⏳';
  try{
    const res=await fetch(url+'?callback=_');
    const text=await res.text();
    const json=JSON.parse(text.replace(/^_\(/,'').replace(/\)$/,''));
    if(json.monthly_mrr) REAL.monthly_mrr=json.monthly_mrr;
    if(json.streams) Object.assign(REAL.streams,json.streams);
    if(json.pipeline) REAL.pipeline=json.pipeline;
    if(json.last_sync) REAL.last_sync=json.last_sync;
    update();
    showSyncStatus('ok',`✅ 동기화 완료 — ${REAL.last_sync}`);
  }catch(e){
    showSyncStatus('error','❌ 동기화 실패: '+e.message+' — GS 웹앱 URL과 CORS 설정을 확인하세요.');
  }finally{
    btn.classList.remove('loading');icon.textContent='🔄';
  }
}
function showSyncStatus(type,msg){
  const el=document.getElementById('sync-status');
  el.className='sync-status '+(type==='ok'?'ok':'err');
  el.textContent=msg;
  if(type==='ok')setTimeout(()=>el.style.display='none',5000);
}
